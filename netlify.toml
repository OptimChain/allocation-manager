[build]
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[dev]
  command = "npm run dev:vite"
  port = 3000
  targetPort = 5173
  framework = "vite"
  autoLaunch = true

# API docs (Redoc rendering /openapi.yaml) — must precede the SPA catch-all
[[redirects]]
  from = "/docs"
  to = "/docs.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
